<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProDash Project Management</title>
    <!-- 引入 Tailwind CSS 與 Lucide Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #FFFBF7; }
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slide-up { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-in { animation: fade-in 0.6s ease-out both; }
        .slide-up { animation: slide-up 0.6s cubic-bezier(0.16, 1, 0.3, 1) both; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #fde6d2; border-radius: 10px; }
        .active-tab { bg-gradient-to-r from-orange-50 to-transparent; color: #ea580c; }
    </style>
</head>
<body class="text-slate-900 overflow-x-hidden">

    <div id="root" class="flex h-screen overflow-hidden">
        <!-- 側邊欄 (固定於 Google Sites 內嵌容器內) -->
        <aside id="sidebar" class="hidden lg:flex flex-col w-72 bg-white border-r border-orange-50/50 p-8 h-full">
            <div class="flex items-center gap-3 mb-12">
                <div class="w-10 h-10 bg-orange-500 rounded-xl flex items-center justify-center shadow-lg shadow-orange-100">
                    <div class="grid grid-cols-2 gap-1">
                        <div class="w-2.5 h-2.5 bg-white rounded-sm opacity-60"></div>
                        <div class="w-2.5 h-2.5 bg-white rounded-sm"></div>
                        <div class="w-2.5 h-2.5 bg-white rounded-sm"></div>
                        <div class="w-2.5 h-2.5 bg-white rounded-sm opacity-60"></div>
                    </div>
                </div>
                <span class="text-2xl font-bold tracking-tight text-slate-800">ProDash</span>
            </div>

            <nav class="space-y-1.5 mb-10 flex-1">
                <p class="px-4 text-[11px] font-bold text-slate-300 uppercase tracking-widest mb-4">選單導覽</p>
                <button onclick="switchTab('dashboard')" id="btn-dashboard" class="w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl font-bold text-sm text-orange-600 bg-orange-50/50 border-0 cursor-pointer text-left transition-all">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i> 儀表板總覽
                </button>
                <button onclick="switchTab('projects')" id="btn-projects" class="w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl font-bold text-sm text-slate-500 border-0 cursor-pointer text-left transition-all hover:bg-slate-50">
                    <i data-lucide="folder-kanban" class="w-5 h-5"></i> 專案導覽
                </button>
                <button onclick="switchTab('team')" id="btn-team" class="w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl font-bold text-sm text-slate-500 border-0 cursor-pointer text-left transition-all hover:bg-slate-50">
                    <i data-lucide="users" class="w-5 h-5"></i> 團隊管理
                </button>
            </nav>

            <div class="mt-auto">
                <div class="bg-[#121926] p-5 rounded-2xl flex flex-col gap-1 shadow-xl shadow-slate-200">
                    <div class="flex items-center gap-3">
                        <div class="w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_8px_rgba(16,185,129,0.8)]"></div>
                        <span class="text-[10px] font-black text-white/90 uppercase tracking-widest">系統連線中</span>
                    </div>
                    <span class="text-[9px] font-bold text-slate-500 ml-5.5">v2.4.0 Sites Mod</span>
                </div>
            </div>
        </aside>

        <!-- 主內容區 -->
        <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
            <header class="h-20 flex items-center justify-between px-10 shrink-0 bg-[#FFFBF7]/80 backdrop-blur-md z-20 border-b border-orange-50/30">
                <div class="flex items-center gap-6">
                    <i data-lucide="search" class="w-4 h-4 text-slate-300"></i>
                    <input type="text" placeholder="搜尋專案..." class="bg-white border border-orange-50 rounded-2xl px-4 py-2 text-sm w-64 outline-none">
                </div>
                <div class="flex items-center gap-4">
                    <div class="text-right">
                        <p class="text-sm font-black text-slate-800 tracking-tight">Sean Huang</p>
                        <p class="text-[10px] font-black text-orange-500 uppercase">PL (管理員)</p>
                    </div>
                    <div class="w-10 h-10 rounded-xl bg-orange-100 border-2 border-white flex items-center justify-center font-black text-orange-600">S</div>
                </div>
            </header>

            <div id="content-area" class="flex-1 overflow-y-auto p-10 pt-2">
                <!-- 內容由 JS 動態替換 -->
            </div>
        </main>
    </div>

    <script>
        // 模擬資料
        const projects = [
            { name: 'MP1100', client: '內部專案', status: '驗證中', progress: 75, statusClass: 'bg-amber-50 text-amber-600 border-amber-100' },
            { name: 'MP1101', client: '內部專案', status: '進行中', progress: 90, statusClass: 'bg-orange-50 text-orange-600 border-orange-100' },
            { name: 'MP1200', client: '內部專案', status: '延遲', progress: 45, statusClass: 'bg-red-50 text-red-500 border-red-100' }
        ];

        function switchTab(tab) {
            const content = document.getElementById('content-area');
            const btns = ['btn-dashboard', 'btn-projects', 'btn-team'];
            
            // 更新按鈕樣式
            btns.forEach(id => {
                const el = document.getElementById(id);
                if (id === `btn-${tab}`) {
                    el.classList.add('bg-orange-50/50', 'text-orange-600');
                    el.classList.remove('text-slate-500', 'hover:bg-slate-50');
                } else {
                    el.classList.remove('bg-orange-50/50', 'text-orange-600');
                    el.classList.add('text-slate-500', 'hover:bg-slate-50');
                }
            });

            if (tab === 'dashboard') {
                content.innerHTML = `
                    <div class="max-w-7xl mx-auto space-y-12 animate-in">
                        <div class="flex flex-col gap-1">
                            <h1 class="text-4xl font-black italic tracking-tighter text-slate-800 uppercase">專案儀表板總覽</h1>
                            <p class="text-[11px] font-bold text-slate-300 uppercase tracking-[0.2em]">Global Project Health</p>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-8 slide-up">
                            <div class="bg-white rounded-[2rem] p-8 border border-orange-50/50 shadow-sm flex items-center gap-8">
                                <div class="w-16 h-16 rounded-2xl bg-orange-50 text-orange-500 flex items-center justify-center"><i data-lucide="briefcase"></i></div>
                                <div><p class="text-[10px] font-black text-slate-300 uppercase">總專案數</p><p class="text-4xl font-black text-slate-800">6</p></div>
                            </div>
                            <div class="bg-white rounded-[2rem] p-8 border border-orange-50/50 shadow-sm flex items-center gap-8">
                                <div class="w-16 h-16 rounded-2xl bg-amber-50 text-amber-500 flex items-center justify-center"><i data-lucide="clock"></i></div>
                                <div><p class="text-[10px] font-black text-slate-300 uppercase">進行中</p><p class="text-4xl font-black text-slate-800">3</p></div>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 xl:grid-cols-3 gap-10 slide-up">
                            <div class="xl:col-span-2 bg-white rounded-[2.5rem] border border-orange-50 shadow-sm overflow-hidden">
                                <div class="p-10 border-b border-slate-50 flex justify-between items-center"><h3 class="font-black italic text-xl uppercase flex items-center gap-2"><i data-lucide="zap" class="text-orange-500"></i> 即時專案狀態</h3></div>
                                <div class="p-4"><table class="w-full">
                                    <tr class="text-[10px] font-black text-slate-300 uppercase border-b border-slate-50">
                                        <th class="p-6">專案名稱</th><th class="p-6">進度</th><th class="p-6">狀態</th>
                                    </tr>
                                    ${projects.map(p => `
                                        <tr class="border-b border-slate-50">
                                            <td class="p-6"><p class="font-black">${p.name}</p></td>
                                            <td class="p-6"><div class="w-32 h-2 bg-slate-50 rounded-full"><div class="bg-orange-500 h-full rounded-full" style="width: ${p.progress}%"></div></div></td>
                                            <td class="p-6"><span class="px-4 py-1 rounded-full text-[10px] font-black border ${p.statusClass}">${p.status}</span></td>
                                        </tr>
                                    `).join('')}
                                </table></div>
                            </div>
                            <div class="bg-white rounded-[2.5rem] border border-orange-50 shadow-sm p-10 flex flex-col items-center">
                                <h3 class="text-xl font-black italic mb-6 tracking-tight uppercase">團隊資源負載</h3>
                                <canvas id="resourceCanvas" style="width:100%; height:200px;"></canvas>
                                <div class="mt-4 text-center"><p class="text-xs font-bold text-slate-400">平均效率: 82.4%</p></div>
                            </div>
                        </div>
                    </div>
                `;
                drawCanvas();
            } else {
                content.innerHTML = `<div class="p-20 text-center"><h2 class="text-2xl font-black text-slate-300 uppercase">頁面建設中 (Sites 版)</h2></div>`;
            }
            lucide.createIcons();
        }

        function drawCanvas() {
            const canvas = document.getElementById('resourceCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            canvas.width = canvas.clientWidth * dpr;
            canvas.height = canvas.clientHeight * dpr;
            ctx.scale(dpr, dpr);

            const data = [45, 88, 62, 95, 30];
            const barWidth = 25;
            const gap = 30;
            data.forEach((val, i) => {
                const x = 20 + i * (barWidth + gap);
                const h = (val / 100) * 120;
                const y = 160 - h;
                
                const grad = ctx.createLinearGradient(0, y, 0, 160);
                grad.addColorStop(0, val > 80 ? '#f97316' : '#fdba74');
                grad.addColorStop(1, '#fb923c');
                
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.roundRect ? ctx.roundRect(x, y, barWidth, h, 6) : ctx.rect(x, y, barWidth, h);
                ctx.fill();
            });
        }

        // 初始化
        window.onload = () => switchTab('dashboard');
    </script>
</body>
</html>
